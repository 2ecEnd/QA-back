spring:
  application:
    name: QA
  datasource:
    url: jdbc:postgresql://localhost:5432/qa-test
    driverClassName: org.postgresql.Driver
    username: postgres
    password: postgres
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 25MB

app:
  upload:
    dir: target/test-uploads

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql:
              BasicBinder: TRACE